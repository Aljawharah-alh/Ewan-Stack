{% extends 'base.html' %}
{% block content %}
<div class="row g-4 mt-2">
    <div class="col-md-6">
        <img src="{{ event.image_url }}" class="img-fluid rounded-4 shadow-lg border-0" style="width: 100%; height: 450px; object-fit: cover;">
    </div>
    
    <div class="col-md-6">
        <div class="p-4 bg-dark rounded-4 shadow" style="background-color: #2b1b4d !important;">
            <h1 class="fw-bold mb-3">{{ event.name }}</h1>
            <p class="text-info fs-5"><i class="bi bi-geo-alt"></i> {{ event.location_name }}</p>
            <hr class="text-muted">
            <p class="fs-5 lh-lg">{{ event.description }}</p>
            <div class="my-4">
                <h4 class="text-white">سعر التذكرة: <span class="text-success fw-bold">{{ event.ticket_price }} ريال</span></h4>
            </div>

            {% if user.is_authenticated %}
            <form action="{% url 'book_event' event.id %}" method="post" class="bg-black p-3 rounded-3 bg-opacity-25">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">كم عدد التذاكر؟</label>
                    <input type="number" name="tickets_count" value="1" min="1" class="form-control bg-dark text-white border-secondary w-50">
                </div>
                <button type="submit" class="btn btn-danger btn-lg w-100 fw-bold" style="background-color: #d63384; border: none;">
                    تأكيد الحجز والذهاب لحجوزاتي
                </button>
            </form>
            {% else %}
            <div class="alert alert-warning">
                يرجى <a href="{% url 'login' %}" class="fw-bold">تسجيل الدخول</a> لتتمكن من حجز تذكرتك.
            </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
