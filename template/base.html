<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> السعودية - فعالياتنا</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #1a1133;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .main-content { flex: 1; }
        .navbar { background-color: rgba(26, 17, 51, 0.9); border-bottom: 1px solid #33245d; }
        .btn-custom-info { background-color: #2c8e9d; color: white; border-radius: 10px; }
        .btn-custom-pink { background-color: #d63384; color: white; border-radius: 10px; }
        footer { background-color: #0f0a21; border-top: 1px solid #33245d; padding: 20px 0; margin-top: 40px; }
        input.form-control { background-color: #1a1133; border: 1px solid #4a3a75; color: white; border-radius: 10px; }
        input.form-control:focus { background-color: #1a1133; color: white; border-color: #d63384; box-shadow: none; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3" href="/">عِش اللحظة.. اكتشف روح المملكة</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link active" href="/">الرئيسية</a></li>
            </ul>
            <div class="d-flex gap-2">
                {% if user.is_authenticated %}
                    <span class="navbar-text me-2 text-info small">أهلاً، {{ user.username }}</span>
                    <a href="{% url 'my_bookings' %}" class="btn btn-outline-light btn-sm rounded-pill px-3">حجوزاتي</a>
                    <form action="{% url 'logout' %}" method="post" class="d-inline m-0">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-sm rounded-pill px-3">خروج</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm rounded-pill px-4">دخول</a>
                    <a href="{% url 'signup' %}" class="btn btn-custom-info btn-sm rounded-pill px-4">اشتراك</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<div class="container main-content mt-4">
    {% block content %}
    {% endblock %}
</div>

<footer>
    <div class="container text-center">
        <p class="mb-1 fw-bold" style="color: #d63384;">روح السعودية © 2026</p>
        <p class="small text-muted mb-0">جميع الحقوق محفوظة</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
